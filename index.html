<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Map | Life in Longboat Key</title>
    <link rel="icon" type="image/png" href="/lbk-logo.png" />
    <link rel="apple-touch-icon" href="/lbk-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://static.wixstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="./src/assets/css/main.css" rel="stylesheet">
    <link href="./src/assets/css/sidebar.css" rel="stylesheet">
    <link href="./src/assets/css/map.css" rel="stylesheet">
    <link href="./src/assets/css/cards.css" rel="stylesheet">
    <link href="./src/assets/css/details-panel.css" rel="stylesheet">
    <link href="./src/assets/css/tablet.css" rel="stylesheet">
    <link href="./src/assets/css/mobile.css" rel="stylesheet">
    <link href="./src/assets/css/embed.css" rel="stylesheet">
    <!-- Set the embed class synchronously (before first paint) so the
         iframe never flashes the full chrome. main.js mirrors this when it
         boots; the param check matches getEmbedParams() in embed.js. -->
    <script>
      try {
        var p = new URLSearchParams(location.search);
        var e = p.get('embed');
        if (e !== null && e !== '0' && e !== 'false') {
          document.documentElement.classList.add('embed');
          // Featured group embed (?embed=<slug> or ?embed=1&group=<slug>)
          // gets the compact full-app chrome. Mirrors getEmbedParams().
          var toggle = ['', '1', 'true', 'yes', 'on'];
          var grp = p.get('group') || (toggle.indexOf(e.toLowerCase()) === -1 ? e : null);
          if (grp) {
            document.documentElement.classList.add('embed-app');
            // Pre-set the counter-scale (mirrors applyEmbedScale in embed.js)
            // so the mobile chrome doesn't flash full-size before JS runs.
            var sw = (window.screen && window.screen.width) || window.innerWidth;
            var sc = (window.innerWidth <= 860 && sw > 0)
              ? Math.max(0.7, Math.min(1, window.innerWidth / sw)) : 1;
            document.documentElement.style.setProperty('--embed-scale', String(sc));
          }
        }
      } catch (_) {}
    </script>
  </head>
  <body>
    <div class="app">
      <!-- Header -->
      <header class="header">
        <a class="brand" href="https://www.lifeinlongboatkey.com" aria-label="Life in Longboat Key home">
          <img class="brand-logo" src="/lbk-logo-long.png" alt="Life in Longboat Key — Your Guide to Longboat Key" />
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a class="site-nav-link" href="https://www.lifeinlongboatkey.com/homes-for-sale">Homes for Sale</a>
          <a class="site-nav-link is-current" href="https://lifeinlongboatkey.web.app" aria-current="page">Compare Neighborhoods</a>
          <a class="site-nav-link" href="https://www.lifeinlongboatkey.com/amenities">Amenities</a>
          <a class="site-nav-link" href="https://www.lifeinlongboatkey.com/contact-us">Contact</a>
        </nav>
        <div class="result-count">
          Showing <strong><span id="resultCount">0</span></strong> of <span id="totalCount">0</span> communities
        </div>
      </header>

      <!-- Main layout -->
      <div class="main">
        <!-- Filters sidebar -->
        <aside class="filters" aria-label="Filters">
          <div class="filter-header">
            <h2>Refine</h2>
            <button id="clearBtn" type="button" class="clear-btn">Clear All</button>
          </div>

          <!-- Community Type pill selector -->
          <div class="filter-section">
            <div class="type-pills" role="radiogroup" aria-label="Community Type">
              <button type="button" class="type-pill active" data-type="all" role="radio" aria-checked="true">All</button>
              <button type="button" class="type-pill" data-type="neighborhood" role="radio" aria-checked="false">Neighborhoods</button>
              <button type="button" class="type-pill" data-type="condo" role="radio" aria-checked="false">Condos</button>
            </div>
          </div>

          <!-- Price -->
          <div class="filter-section">
            <h3 class="filter-label">Price</h3>
            <div id="priceList" class="chip-row"></div>
          </div>

          <!-- Currently for sale toggle (default ON) -->
          <div class="filter-section">
            <button id="forSaleToggle" type="button" class="toggle-row" aria-pressed="true">
              <span>Currently for sale</span>
              <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </button>
          </div>

          <!-- Home Type -->
          <div class="filter-section">
            <h3 class="filter-label">Home Type</h3>
            <div id="homeTypeList" class="checklist"></div>
          </div>

          <!-- Bedrooms -->
          <div class="filter-section">
            <h3 class="filter-label">Bedrooms</h3>
            <div id="bedroomList" class="chip-row"></div>
          </div>

          <!-- Amenities -->
          <div class="filter-section">
            <h3 class="filter-label">Amenities</h3>
            <div id="amenityList" class="checklist"></div>
          </div>

          <!-- Location on Island -->
          <div class="filter-section">
            <h3 class="filter-label">Location on Island</h3>
            <div id="locationList" class="checklist"></div>
          </div>

          <!-- Save / close button — only shown on mobile when the
               filters panel is a full-screen overlay. -->
          <button id="filtersSave" type="button" class="filters-save-btn">
            Save
          </button>
        </aside>

        <!-- Content area: map + list -->
        <section id="content" class="content layout-map">
          <!-- Mobile-only segmented toggle between map and list view. -->
          <div class="view-switch" role="tablist" aria-label="View mode">
            <button id="viewMapBtn" type="button" class="view-switch-btn is-active" data-view="map" role="tab" aria-selected="true">Map</button>
            <button id="viewListBtn" type="button" class="view-switch-btn" data-view="list" role="tab" aria-selected="false">List</button>
          </div>

          <div class="map-wrap">
            <div id="map" class="map"></div>
            <div class="map-legend" aria-hidden="true">
              <span class="legend-item"><span class="legend-dot legend-condo"></span>Condo</span>
              <span class="legend-item"><span class="legend-dot legend-nbhd"></span>Neighborhood</span>
            </div>
            <div id="hoverCard" class="hover-card" aria-hidden="true"></div>
            <!-- Shown only in embed mode (body.embed). Links out to the full
                 interactive map, pre-focused on the embedded community. -->
            <a id="embedCta" class="embed-cta" href="https://lifeinlongboatkey.web.app" target="_blank" rel="noopener">
              Explore all neighborhoods on the full map →
            </a>
          </div>

          <div class="list-view" aria-label="Community list">
            <ul id="listView" class="list-view-items"></ul>
          </div>

          <aside class="detail-panel" aria-label="Community details" aria-hidden="true">
            <button id="detailClose" type="button" class="detail-close" aria-label="Close details">×</button>
            <button id="detailBack" type="button" class="detail-back-mobile" aria-label="Back to results">‹ Back to results</button>
            <div id="detailContent" class="detail-content"></div>
          </aside>

          <!-- "Narrow it down" drawer trigger. Lives in the content area (not
               the header) so it still renders when embed mode hides the header.
               Shown only on mobile and in the featured embed (CSS-gated). -->
          <button id="filtersToggle" type="button" class="filters-toggle-btn" aria-label="Open filters">
            Narrow it down
          </button>
        </section>
      </div>
    </div>

    <script src="./config.js"></script>
    <script type="module" src="./src/assets/js/main.js"></script>
  </body>
</html>
