name: Wix Sync

# Manually triggered from the Actions tab. Pulls the
# Neighborhoods & Condos collection from Wix, maps fields onto our
# communities.json schema, and (in 'sync' mode) commits + pushes
# the diff so the live site picks up the change on the next deploy.
#
# Three secrets must exist on this repo:
#   WIX_SITE_ID
#   WIX_API_KEY
#   WIX_COLLECTION_ID
# Add them at: Settings -> Secrets and variables -> Actions -> New repository secret.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: sync
        type: choice
        options:
          - inspect   # fetch one item, print its raw shape, exit without writing
          - dry       # full run, print report, but don't write/commit anything
          - sync      # write communities.json + commit + push if anything changed
  schedule:
    # Every 30 minutes. Scheduled runs always use 'sync' mode (inputs
    # are unset on schedule triggers, so the case-default kicks in).
    - cron: "*/30 * * * *"

permissions:
  contents: write  # workflow needs to push the data update back to main

# Don't let two syncs trample each other if a manual click overlaps a
# scheduled run.
concurrency:
  group: wix-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run sync (${{ inputs.mode || 'sync' }})
        env:
          WIX_SITE_ID: ${{ secrets.WIX_SITE_ID }}
          WIX_API_KEY: ${{ secrets.WIX_API_KEY }}
          WIX_COLLECTION_ID: ${{ secrets.WIX_COLLECTION_ID }}
          # Optional. Set this in repo secrets to enable the
          # 'Currently for sale' filter to actually filter.
          WIX_LISTINGS_COLLECTION_ID: ${{ secrets.WIX_LISTINGS_COLLECTION_ID }}
        run: |
          set -e
          mode="${{ inputs.mode || 'sync' }}"
          case "$mode" in
            inspect) node scripts/sync-from-wix.mjs --inspect ;;
            dry)     node scripts/sync-from-wix.mjs --dry ;;
            sync)    node scripts/sync-from-wix.mjs ;;
            *) echo "Unknown mode: $mode"; exit 1 ;;
          esac

      - name: Commit and push if changed
        if: ${{ (inputs.mode || 'sync') == 'sync' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/communities.json
          if git diff --staged --quiet; then
            echo "No changes from sync — nothing to commit."
          else
            git commit -m "Sync community data from Wix"
            git push
          fi
